name: Train Ranked Models From Anonymized Relay

on:
  push:
    branches: [feature/ranked-dataset-closure-gru-v1]
    paths:
      - .github/workflows/train-anonymized-relay.yml

permissions:
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install training dependencies
        run: python -m pip install -e ".[ml]"
      - name: Download and verify anonymized cache
        shell: bash
        run: |
          curl --fail --location --retry 3 --retry-delay 2 \
            https://tempfile.org/1gefvYDi4QE/download \
            --output relay-cache.bin
          echo "b22f52f8b6f354e7219db3571db2a1e4e06d072fff90bce31c1607093f8000cb  relay-cache.bin" | sha256sum --check --strict
      - name: Train baseline and GRU, select on validation, evaluate test once
        shell: bash
        run: |
          MANIFEST_SHA=$(sha256sum datasets/ranked_explicit_v3_72/v1/manifest.json | cut -d' ' -f1)
          python scripts/train_anonymized_relay.py \
            --cache relay-cache.bin \
            --output model-results \
            --dataset-manifest-sha256 "$MANIFEST_SHA" \
            --seed 20260722
      - name: Upload reproducible model results
        uses: actions/upload-artifact@v4
        with:
          name: ranked-model-results-v1
          path: model-results
          if-no-files-found: error
          retention-days: 7
      - name: Delete temporary relay object
        if: always()
        run: curl --request DELETE --fail --silent --show-error https://tempfile.org/api/file/1gefvYDi4QE || true
