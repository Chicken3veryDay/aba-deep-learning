name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with ML extras
        run: python -m pip install -e ".[ml]"
      - name: Capture tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > test-output.txt 2>&1
          code=$?
          echo "$code" > test-exit-code.txt
          tail -n 200 test-output.txt
          exit 0
      - name: Upload test transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            test-output.txt
            test-exit-code.txt
          retention-days: 1
      - name: Enforce test result
        shell: bash
        run: test "$(cat test-exit-code.txt)" -eq 0
      - name: Validate committed evidence
        run: python scripts/validate_evidence.py
      - name: Validate ranked dataset v1
        run: python scripts/validate_ranked_release.py datasets/ranked_explicit_v3_72/v1
