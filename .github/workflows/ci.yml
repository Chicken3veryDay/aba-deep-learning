name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with ML extras
        run: python -m pip install -e ".[ml]"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Validate committed evidence
        run: python scripts/validate_evidence.py
      - name: Validate ranked dataset v1
        run: python scripts/validate_ranked_release.py datasets/ranked_explicit_v3_72/v1
