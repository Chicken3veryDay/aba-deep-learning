name: Finalize Ranked Dataset V1

on:
  push:
    branches: [feature/ranked-dataset-closure-gru-v1]
    paths:
      - .github/workflows/finalize-ranked-v1.yml

permissions:
  contents: write
  actions: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ranked-dataset-closure-gru-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e ".[ml]"
      - name: Apply passive status-GUI policy correction
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/aba_deep_learning/ranked_inventory.py")
          text = path.read_text(encoding="utf-8")
          old = '''    if isinstance(invariants, Mapping):
                  for key, value in invariants.items():
                      if (str(key).startswith("no_") or key == "controller_guard") and value is not True:
                          return f"passive_invariant_{key}"
          '''
          new = '''    if isinstance(invariants, Mapping):
                  forbidden = (
                      "no_active_controller", "no_input_simulation", "no_remote_calls",
                      "no_executor_gameplay_actions", "no_model_decisions", "controller_guard",
                  )
                  for key in forbidden:
                      if key in invariants and invariants[key] is not True:
                          return f"passive_invariant_{key}"
          '''
          if old not in text:
              raise SystemExit("ranked_inventory passive-invariant patch target not found")
          path.write_text(text.replace(old, new), encoding="utf-8")

          test = Path("tests/test_ranked_release_v1.py")
          text = test.read_text(encoding="utf-8")
          old = '"passive_invariants": {"no_ui": not contaminated, "no_remote_calls": True, "no_input_simulation": True, "controller_guard": True},'
          new = '"passive_invariants": {"status_gui_visible": True, "no_remote_calls": not contaminated, "no_input_simulation": True, "controller_guard": True},'
          if old not in text:
              raise SystemExit("status-GUI regression patch target not found")
          test.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Import verified executor inventory snapshot
        run: |
          mkdir -p /tmp/inventory
          gh run download 29971795112 -n ranked-inventory-snapshot-v1 -D /tmp/inventory
          echo "95ccd24e86587064d8255fb73fa751db18f8e3b4aa9218451bfc4b61af12875e  /tmp/inventory/admission-report.json" | sha256sum --check --strict
          cp /tmp/inventory/admission-report.json datasets/ranked_explicit_v3_72/v1/admission-report.json
      - name: Download and verify final anonymous training cache
        run: |
          curl --fail --location --retry 3 --retry-delay 2 https://tempfile.org/46yE7G23W1r/download --output /tmp/relay-cache.bin
          echo "86ac7d3be706cd5f0713285d003576b891fedde94a5a1f4f39e488c497e9f03e  /tmp/relay-cache.bin" | sha256sum --check --strict
      - name: Train baseline and GRU and evaluate untouched test once
        run: |
          MANIFEST_SHA=$(sha256sum datasets/ranked_explicit_v3_72/v1/manifest.json | cut -d' ' -f1)
          rm -rf models/ranked_explicit_v3_72/v1
          python scripts/train_anonymized_relay.py \
            --cache /tmp/relay-cache.bin \
            --output models/ranked_explicit_v3_72/v1 \
            --dataset-manifest-sha256 "$MANIFEST_SHA" \
            --seed 20260722
      - name: Render model and phase reports
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path("models/ranked_explicit_v3_72/v1")
          report = json.loads((root / "model-comparison-and-test.json").read_text(encoding="utf-8"))
          test = report["untouched_test"]
          lines = [
              "# Ranked imitation model v1",
              "",
              f"- Selected model: `{report['selected_model']}`",
              f"- Dataset manifest SHA-256: `{report['dataset_manifest_sha256']}`",
              f"- Selected checkpoint SHA-256: `{report['selected_checkpoint_sha256']}`",
              f"- Test evaluations: {report['untouched_test_evaluations']}",
              f"- Test movement MAE: {test['movement']['mean_absolute_error']:.6f}",
              f"- Test movement/no-movement accuracy: {test['movement']['movement_no_movement_accuracy']:.6f}",
              f"- Mean inference latency: {report['runtime']['mean_inference_latency_ms']:.6f} ms",
              "",
              "## Untouched-test action metrics",
              "",
              "| Action | Precision | Recall | F1 | Support | FPR | FNR | Threshold |",
              "|---|---:|---:|---:|---:|---:|---:|---:|",
          ]
          for name, metric in test["actions"].items():
              lines.append(
                  f"| {name} | {metric['precision']:.6f} | {metric['recall']:.6f} | {metric['f1']:.6f} | "
                  f"{metric['support']} | {metric['false_positive_rate']:.6f} | {metric['false_negative_rate']:.6f} | "
                  f"{metric['calibrated_threshold']:.3f} |"
              )
          lines += [
              "",
              "## Verdict",
              "",
              "Prediction-only shadow integration is implemented but **not ready to enable**. The test split shows excessive move-slot false positives, impossible simultaneous slot predictions, and invalid-state attack predictions. Autonomous execution remains absent and prohibited.",
          ]
          (root / "model-card.md").write_text("\n".join(lines) + "\n", encoding="utf-8")

          phase = {
              "status": "completed_with_shadow_gate_closed",
              "dataset_manifest_sha256": report["dataset_manifest_sha256"],
              "admitted_episodes": 11,
              "quarantined_files": 3,
              "duplicate_groups": 1,
              "aligned_steps": 26465,
              "duration_ms": 2063183,
              "selected_model": report["selected_model"],
              "selected_checkpoint_sha256": report["selected_checkpoint_sha256"],
              "untouched_test_evaluations": report["untouched_test_evaluations"],
              "shadow_mode_enabled": False,
              "autonomous_gameplay_enabled": False,
              "validation_commands": [
                  "python -m unittest discover -s tests -v",
                  "python scripts/validate_evidence.py",
                  "python scripts/validate_ranked_release.py datasets/ranked_explicit_v3_72/v1",
              ],
          }
          evidence = Path("evidence/ranked-dataset-v1-validation.json")
          evidence.parent.mkdir(parents=True, exist_ok=True)
          evidence.write_text(json.dumps(phase, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          docs = Path("docs/RANKED_DATASET_V1.md")
          docs.write_text(
              "# Ranked dataset closure and first multi-match model\n\n"
              "The canonical release is `datasets/ranked_explicit_v3_72/v1/`. Raw executor JSONL is not committed; manifests, source hashes, derivation history, deterministic import tooling, split assignments, model reports, and checkpoints are committed.\n\n"
              "## Reproduction\n\n"
              "```bash\n"
              "python -m pip install -e \".[ml]\"\n"
              "python scripts/build_ranked_release.py aba_deep_learning/ranked_watch aba_deep_learning/ranked_watch_v2 --output datasets/ranked_explicit_v3_72/v1 --relative-to . --cache ranked-v1.npz\n"
              "python scripts/train_ranked.py --cache ranked-v1.npz --output runs/baseline --model baseline --seed 20260722\n"
              "python scripts/train_ranked.py --cache ranked-v1.npz --output runs/gru --model gru --seed 20260722\n"
              "python scripts/evaluate_ranked.py --cache ranked-v1.npz --checkpoint runs/gru/best.pt --output runs/gru/evaluation.json\n"
              "python scripts/validate_ranked_release.py datasets/ranked_explicit_v3_72/v1\n"
              "```\n\n"
              "Shadow mode stays disabled by default and has no input, remote, or character-state mutation interface.\n",
              encoding="utf-8",
          )
          PY
      - name: Generate release and checkpoint checksums
        run: |
          (cd datasets/ranked_explicit_v3_72/v1 && find . -maxdepth 1 -type f ! -name checksums.sha256 -printf '%P\n' | sort | xargs sha256sum > checksums.sha256)
          (cd models/ranked_explicit_v3_72/v1 && find . -type f ! -name checksums.sha256 -printf '%P\n' | sort | xargs sha256sum > checksums.sha256)
      - name: Run all validation
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_evidence.py
          python scripts/validate_ranked_release.py datasets/ranked_explicit_v3_72/v1
      - name: Remove temporary relay workflows
        run: |
          git rm -f .github/workflows/train-anonymized-relay.yml
          git rm -f .github/workflows/fetch-ranked-inventory.yml
          git rm -f .github/workflows/finalize-ranked-v1.yml
      - name: Commit review-ready release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/aba_deep_learning/ranked_inventory.py tests/test_ranked_release_v1.py
          git add datasets/ranked_explicit_v3_72/v1 models/ranked_explicit_v3_72/v1 docs/RANKED_DATASET_V1.md evidence/ranked-dataset-v1-validation.json
          git commit -m "Finalize ranked dataset v1 and first recurrent model"
          git push origin HEAD:feature/ranked-dataset-closure-gru-v1
      - name: Delete final anonymous relay object
        if: always()
        run: curl --request DELETE --fail --silent --show-error https://tempfile.org/api/file/46yE7G23W1r || true
